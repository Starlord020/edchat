<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkuaz İzleme Odası</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <div id="create-screen" class="screen hidden">
        <div class="glass-box">
            <h1>Oda Oluştur</h1>
            <p>Arkadaşlarınla izlemek için şifreli bir oda kur.</p>
            <input type="text" id="new-room-pass" placeholder="Oda için bir şifre belirle..." autocomplete="off">
            <button id="create-btn">Odayı Kur ve Linki Al</button>
        </div>
    </div>

    <div id="password-screen" class="screen hidden">
        <div class="glass-box">
            <div class="lock-icon">🔒</div>
            <h2 class="glow-text">Oda Güvenlik Şifresi</h2>
            <input type="text" id="join-username" placeholder="Kullanıcı Adınız" autocomplete="off">
            <input type="password" id="join-password" placeholder="Oda Şifresi" autocomplete="off">
            <button id="join-btn">Odaya Gir</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden" style="position: relative;">
        
        <div class="top-hover-area">
            <button id="header-toggle-btn" title="Menüyü Gizle/Göster"><i class="fas fa-chevron-up"></i></button>
        </div>

        <div class="header" id="main-header">
            <h2 class="glow-text">Turkuaz Odası</h2>
            
            <div class="video-controls-header">
                <input type="text" id="youtube-url" placeholder="YouTube Linki Yapıştırın..." autocomplete="off">
                <button id="load-btn">Aç</button>
            </div>

            <div class="header-controls">
                <div class="participants-wrapper">
                    <button id="participants-btn" class="outline-btn"><i class="fas fa-users"></i> <span class="hide-mobile">Katılanlar</span> (<span id="user-count">1</span>)</button>
                    <div id="participants-dropdown" class="dropdown-menu hidden">
                        <h4>Odada Kimler Var?</h4>
                        <ul id="participants-list"></ul>
                    </div>
                </div>
                <button id="toggle-mic-btn" class="control-btn muted"><i class="fas fa-microphone-slash"></i></button>
                <button id="toggle-cam-btn" class="control-btn camera-off"><i class="fas fa-video-slash"></i></button>
                <button id="copy-link-btn" class="outline-btn"><span class="hide-mobile">Davet Linki</span><i class="fas fa-link show-mobile-inline"></i></button>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="video-section">
                <div class="camera-boxes-container hidden" id="camera-boxes-container">
                    <div class="camera-box hidden" id="local-camera-box" style="left: 10px; top: 10px;">
                        <video id="local-video" autoplay muted playsinline></video>
                        <div class="camera-placeholder">Kamera Kapalı</div>
                    </div>
                </div>

                <div class="player-wrapper">
                    <div id="player"></div>
                </div>
            </div>

            <button id="chat-toggle-btn" class="chat-bubble-btn">
                <i class="fas fa-comment-dots"></i>
                <span id="unread-badge" class="unread-badge hidden">0</span>
            </button>

            <div class="chat-floating chat-closed" id="chat-panel">
                <div class="chat-header-bar">
                    <h3>Sohbet</h3>
                    <button id="chat-close-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="chat-section">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="msg-input" placeholder="Mesaj yazın..." autocomplete="off">
                        <button id="send-btn">Gönder</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
